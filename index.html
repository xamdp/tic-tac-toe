<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Tic Tac Toe</title>
        <link rel="stylesheet" href="./styles.css" />
    </head>
    <body>
        <div class="container">
            <div class="intro">
                <form action="/" id="addPlayer" class="player-form">
                    <p class="input-player">
                        <label for="playerone">Player One</label>
                        <input type="text" id="playerone" name="playerone" />
                    </p>
                    <p class="input-player">
                        <label for="playertwo">Player Two</label>
                        <input type="text" id="playertwo" name="playertwo" />
                    </p>
                    <button id="start-game" type="submit" class="start-btn">
                        Start Game !
                    </button>
                </form>
            </div>
            <div class="board-ctn">
                <div class="messages">
                    <div class="message"></div>
                    <div class="turn"></div>
                </div>
                <div class="board"></div>
                <button id="play-again-btn" class="play-again">
                    Play Again
                </button>
            </div>
        </div>
        <script src="./script.js"></script>
    </body>
</html>
